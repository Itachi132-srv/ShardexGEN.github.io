<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Withdraw Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #92fe9d;
            --error: #ff4b2b;
            --success: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Glassmorphism Card */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
        }

        h2 {
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-size: 22px;
        }

        .hidden { display: none; }
        
        /* Buttons Styling */
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(118, 75, 162, 0.5);
        }

        button:disabled {
            background: #2c3e50;
            cursor: not-allowed;
            opacity: 0.5;
            transform: none;
        }

        /* Inputs Styling */
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            text-align: center;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.5);
        }

        /* Generated Code Box (Cool Font) */
        #generatedCode {
            font-family: 'Orbitron', sans-serif;
            background: rgba(0, 210, 255, 0.1);
            color: var(--primary);
            padding: 20px;
            margin: 20px 0;
            border: 2px dashed var(--primary);
            border-radius: 15px;
            font-size: 24px;
            letter-spacing: 4px;
            cursor: pointer;
            text-shadow: 0 0 10px var(--primary);
            display: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.02); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        #statusMessage {
            margin-top: 20px;
            font-weight: 600;
            font-size: 18px;
        }

        .error { color: var(--error); }
        .success { color: var(--success); text-shadow: 0 0 10px var(--success); }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #aaa;
            text-decoration: none;
            font-size: 12px;
            cursor: pointer;
        }

        .back-link:hover { color: white; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div id="screen1">
        <h2>System Access</h2>
        <button onclick="nav('screen1', 'screen2')">Withdraw</button>
        <button disabled style="position: relative;">Deposit <span style="font-size: 10px; vertical-align: top;">(SOON)</span></button>
    </div>

    <div id="screen2" class="hidden">
        <h2>Select Method</h2>
        <button onclick="setMethod('OWO')">OWO Wallet</button>
        <button onclick="setMethod('LTC')">LTC Wallet</button>
        <a class="back-link" onclick="nav('screen2', 'screen1')">Go Back</a>
    </div>

    <div id="screen3" class="hidden">
        <h2 id="methodTitle">Details</h2>
        <input type="text" id="username" placeholder="Enter Username">
        <input type="text" id="userid" placeholder="Enter User ID">
        <button onclick="handleGenerate()">Generate Code</button>
        
        <div id="generatedCode" title="Click to copy code"></div>
        
        <div id="redeemArea" class="hidden">
            <input type="text" id="redeemInput" placeholder="Enter Code to Redeem">
            <button onclick="handleRedeem()" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">Redeem Now</button>
        </div>

        <div id="statusMessage"></div>
        <a class="back-link" onclick="nav('screen3', 'screen2')">Back to Methods</a>
    </div>
</div>

<script>
    let activeCode = "";

    // Simple navigation function
    function nav(hide, show) {
        document.getElementById(hide).classList.add('hidden');
        document.getElementById(show).classList.remove('hidden');
        // Resetting status messages when moving
        document.getElementById('statusMessage').innerText = "";
    }

    function setMethod(name) {
        document.getElementById('methodTitle').innerText = name + " Withdrawal";
        nav('screen2', 'screen3');
    }

    function handleGenerate() {
        const u = document.getElementById('username').value;
        const i = document.getElementById('userid').value;

        if (u.trim() === "" || i.trim() === "") {
            alert("Please fill in both Username and User ID");
            return;
        }

        // Generate a cool random code
        activeCode = "X-" + Math.random().toString(36).substr(2, 7).toUpperCase();
        
        const display = document.getElementById('generatedCode');
        display.innerText = activeCode;
        display.style.display = "block";

        // Click to copy logic
        display.onclick = function() {
            navigator.clipboard.writeText(activeCode);
            alert("Code Copied! Now enter it below to redeem.");
            document.getElementById('redeemArea').classList.remove('hidden');
        };
    }

    function handleRedeem() {
        const input = document.getElementById('redeemInput').value;
        const status = document.getElementById('statusMessage');

        if (input === activeCode && activeCode !== "") {
            status.innerText = "Successful Withdrawal ✅";
            status.className = "success";
        } else {
            status.innerText = "Invalid Code ❌";
            status.className = "error";
        }
    }
</script>

</body>
</html>
