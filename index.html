<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shardex Gen</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cream: #FFF5E1;
            --orange-light: #FF9F45;
            --orange-dark: #F76E11;
            --error: #FF1E1E;
            --success: #27ae60;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #FF9F45 0%, #FFF5E1 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(247, 110, 17, 0.2);
            width: 380px;
            text-align: center;
            position: relative;
            border: 4px solid var(--cream);
        }

        h2 { color: var(--orange-dark); margin-bottom: 20px; text-transform: uppercase; }

        .hidden { display: none; }

        /* Stylish Inputs */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid var(--cream);
            border-radius: 12px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
            font-size: 14px;
        }

        input:focus { border-color: var(--orange-light); }

        /* Buttons */
        button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, var(--orange-light), var(--orange-dark));
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: translateY(-2px); opacity: 0.9; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* Custom Alert/Notification */
        #customAlert {
            position: fixed;
            top: 20px;
            right: -300px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 5px solid var(--orange-dark);
            transition: 0.5s;
            z-index: 1000;
        }

        /* Generated Code Section */
        #codeBox {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            color: var(--orange-dark);
            background: var(--cream);
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            border: 2px dashed var(--orange-light);
            cursor: pointer;
        }

        .error-text { color: var(--error); font-size: 12px; display: none; margin-top: -8px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="customAlert">Message here!</div>

<div class="card" id="mainCard">
    <div id="step1">
        <h2>Welcome</h2>
        <button onclick="moveStep('step1', 'step2')">Withdraw</button>
        <button disabled style="background: #eee; color: #999;">Deposit (Soon)</button>
    </div>

    <div id="step2" class="hidden">
        <h2>Method</h2>
        <button onclick="openForm('Owo')">Owo Wallet</button>
        <button onclick="openForm('LTC')">LTC Wallet</button>
    </div>

    <div id="step3" class="hidden">
        <h2 id="methodTitle">Details</h2>
        <input type="text" id="username" placeholder="Username">
        
        <input type="text" id="userid" placeholder="User ID (Numbers Only)" oninput="validateID(this)">
        <div id="idError" class="error-text">Fill Properly (Numbers Only)</div>
        
        <button id="genBtn" onclick="generateNow()">Generate Code</button>
    </div>

    <div id="step4" class="hidden">
        <h2 style="color: var(--success);">Redeem</h2>
        <p style="font-size: 12px; color: #666;">Click code to copy</p>
        <div id="codeBox" onclick="copyCode()"></div>
        
        <input type="text" id="redeemInput" placeholder="Paste Code Here">
        <button onclick="finalRedeem()" style="background: var(--success);">Confirm Withdrawal</button>
        <p id="finalStatus" style="font-weight: bold; margin-top: 15px;"></p>
    </div>
</div>

<script>
    let generatedCode = "";

    // Custom Stylish Alert function
    function showAlert(msg, color = "#F76E11") {
        const alertBox = document.getElementById('customAlert');
        alertBox.innerText = msg;
        alertBox.style.borderLeftColor = color;
        alertBox.style.right = "20px";
        setTimeout(() => { alertBox.style.right = "-300px"; }, 3000);
    }

    function moveStep(hide, show) {
        document.getElementById(hide).classList.add('hidden');
        document.getElementById(show).classList.remove('hidden');
    }

    function openForm(method) {
        document.getElementById('methodTitle').innerText = method + " Info";
        moveStep('step2', 'step3');
    }

    // Numbers Only Validation
    function validateID(input) {
        const error = document.getElementById('idError');
        const regex = /^[0-9]*$/;
        if (!regex.test(input.value)) {
            error.style.display = "block";
            input.style.borderColor = "var(--error)";
        } else {
            error.style.display = "none";
            input.style.borderColor = "var(--cream)";
        }
    }

    function generateNow() {
        const u = document.getElementById('username').value;
        const i = document.getElementById('userid').value;
        const regex = /^[0-9]+$/;

        if (u === "" || !regex.test(i)) {
            showAlert("Fill Properly!", "#FF1E1E");
            return;
        }

        generatedCode = "OC-" + Math.random().toString(36).substr(2, 6).toUpperCase();
        document.getElementById('codeBox').innerText = generatedCode;
        moveStep('step3', 'step4');
        showAlert("Code Generated successfully!");
    }

    function copyCode() {
        navigator.clipboard.writeText(generatedCode);
        showAlert("Code Copied to clipboard!", "#27ae60");
    }

    function finalRedeem() {
        const input = document.getElementById('redeemInput').value;
        const status = document.getElementById('finalStatus');

        if (input === generatedCode && generatedCode !== "") {
            status.innerText = "Successful Withdrawal ✅";
            status.style.color = "var(--success)";
            showAlert("Success!", "#27ae60");
        } else {
            status.innerText = "Invalid Code! ❌";
            status.style.color = "var(--error)";
            showAlert("Invalid Code!", "#FF1E1E");
        }
    }
</script>

</body>
</html>
