<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shardex Gen Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cream: #FFF5E1;
            --orange: #FF9F45;
            --orange-deep: #F76E11;
            --success: #2ecc71;
            --error: #e74c3c;
        }

        * { font-family: 'Poppins', sans-serif; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #FF9F45 0%, #FFF5E1 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 400px;
            text-align: center;
            border: 5px solid var(--cream);
        }

        h2 { 
            font-family: 'Orbitron', sans-serif; 
            color: var(--orange-deep); 
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .hidden { display: none; }

        /* Input Styles */
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid var(--cream);
            border-radius: 15px;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
            text-align: center;
        }

        input:focus { border-color: var(--orange); }

        /* Button Styles */
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 15px;
            background: linear-gradient(45deg, var(--orange), var(--orange-deep));
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(247, 110, 17, 0.3);
        }

        button:hover { transform: scale(1.02); opacity: 0.9; }

        /* Code Box */
        #codeBox {
            font-family: 'Orbitron', sans-serif;
            background: var(--cream);
            color: var(--orange-deep);
            padding: 20px;
            border-radius: 15px;
            margin: 15px 0;
            border: 2px dashed var(--orange);
            font-size: 20px;
            cursor: pointer;
        }

        /* Custom Popup */
        #popup {
            position: fixed;
            top: 20px;
            right: -350px;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-left: 6px solid var(--orange-deep);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            font-weight: 600;
        }

        .error-msg { color: var(--error); font-size: 11px; margin-top: -5px; display: none; }
    </style>
</head>
<body>

<div id="popup">Notification</div>

<div class="card">
    <div id="step1">
        <h2>Shardex Gen</h2>
        <button onclick="nav('step1', 'step2')">Withdraw</button>
        <button disabled style="opacity: 0.5;">Deposit (Soon)</button>
    </div>

    <div id="step2" class="hidden">
        <h2>Method</h2>
        <button onclick="openForm('Owo')">Owo Wallet</button>
        <button onclick="openForm('LTC')">LTC Wallet</button>
    </div>

    <div id="step3" class="hidden">
        <h2 id="methodTitle">Details</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="text" id="userid" placeholder="User ID (Numbers)" oninput="checkNum(this)">
        <div id="idErr" class="error-msg">Fill Properly (Numbers Only)</div>
        
        <button id="genBtn" onclick="generateCode()">Generate Code</button>
        
        <div id="codeDisplayArea" class="hidden">
            <div id="codeBox" onclick="copyCode()">CODE HERE</div>
            <p style="font-size: 11px; color: #888;">Click code to copy</p>
            <button id="nextBtn" class="hidden" onclick="nav('step3', 'step4')" style="background: #333;">Next Step</button>
        </div>
    </div>

    <div id="step4" class="hidden">
        <h2>Redeem</h2>
        <input type="text" id="redeemInput" placeholder="Paste Code Here" oninput="checkRedeem(this)">
        
        <button id="redeemBtn" class="hidden" onclick="finalProcess()" style="background: var(--success);">Redeem Now</button>
        
        <div id="finalMessage" style="margin-top: 20px; font-weight: bold;"></div>
    </div>
</div>

<script>
    let myCode = "";

    function showPopup(msg, color = "#F76E11") {
        const p = document.getElementById('popup');
        p.innerText = msg;
        p.style.borderLeftColor = color;
        p.style.right = "20px";
        setTimeout(() => { p.style.right = "-350px"; }, 3000);
    }

    function nav(h, s) {
        document.getElementById(h).classList.add('hidden');
        document.getElementById(s).classList.remove('hidden');
    }

    function openForm(m) {
        document.getElementById('methodTitle').innerText = m + " Portal";
        nav('step2', 'step3');
    }

    function checkNum(el) {
        const err = document.getElementById('idErr');
        if (/[^0-9]/.test(el.value)) {
            err.style.display = "block";
            el.style.borderColor = "var(--error)";
        } else {
            err.style.display = "none";
            el.style.borderColor = "var(--cream)";
        }
    }

    function generateCode() {
        const u = document.getElementById('username').value;
        const i = document.getElementById('userid').value;
        if(u === "" || i === "" || /[^0-9]/.test(i)) {
            showPopup("Fill Properly!", "#e74c3c");
            return;
        }

        myCode = "SHX-" + Math.random().toString(36).substr(2, 6).toUpperCase();
        document.getElementById('codeBox').innerText = myCode;
        document.getElementById('codeDisplayArea').classList.remove('hidden');
        document.getElementById('genBtn').classList.add('hidden');
        showPopup("Code Generated!");
    }

    function copyCode() {
        navigator.clipboard.writeText(myCode);
        showPopup("Copied! Click Next.", "#2ecc71");
        document.getElementById('nextBtn').classList.remove('hidden');
    }

    function checkRedeem(el) {
        const rBtn = document.getElementById('redeemBtn');
        if(el.value.trim() === myCode) {
            rBtn.classList.remove('hidden');
        } else {
            rBtn.classList.add('hidden');
        }
    }

    function finalProcess() {
        const msg = document.getElementById('finalMessage');
        msg.innerHTML = "<span style='color:var(--success)'>Successfully Withdrawal ✅</span>";
        showPopup("Withdrawal Completed!", "#2ecc71");
        document.getElementById('redeemBtn').style.display = "none";
    }
</script>

</body>
</html>
